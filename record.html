<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record</title>
    <style>
        
        :root {
            --bg-color: #14532d; 
            --bg-gradient: linear-gradient(135deg, #14532d 0%, #064e3b 100%);
            --text-color: #ffffff;
            --text-secondary: #bbf7d0; 
            --font-main: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

       
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-color);
            font-family: var(--font-main);
            min-height: 100vh; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
            line-height: 1.2;
            -webkit-font-smoothing: antialiased; 
        }

        
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 1200px;
            width: 100%;
            
           
            animation: fadeInUp 1s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

      
        h1 {
            font-size: clamp(1.5rem, 4vw, 3rem); 
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.15em; 
            margin-bottom: 1rem;
            opacity: 0.9;
        }

       
        .counter-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

     
        .number {
            font-size: clamp(6rem, 20vw, 18rem);
            font-weight: 800;
            line-height: 0.9;
            letter-spacing: -0.05em; 
            text-shadow: 0 10px 30px rgba(0,0,0,0.2); 
        }

       
        .label {
            font-size: clamp(1rem, 2vw, 2rem);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--text-secondary);
            margin-top: 0.5rem;
            margin-left: 0.2rem; 
        }

      
        .status-line {
            position: absolute;
            bottom: 2rem;
            font-size: 0.875rem;
            opacity: 0.4;
            letter-spacing: 0.05em;
        }

      
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <main class="container">
        <h1>Record</h1>
        
        <div class="counter-wrapper">
            <span class="number">842</span>
            <span class="label">days</span>
        </div>
    </main>

    <!-- Optional subtle footer -->
    <footer class="status-line">
        Current Status
    </footer>

</body>
</html>
